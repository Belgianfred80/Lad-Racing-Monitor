name: Monitoring Ladbrokes

on:
  schedule:
    - cron: "*/31 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Playwright
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Lancer les vérifications
        run: node monitor/check.js

      - name: Générer la page de statut
        if: always()
        run: |
          node -e '
          const fs = require("fs");
          let d; try { d = JSON.parse(fs.readFileSync("artifacts/summary.json")); } catch(e) { process.exit(0); }
          const date = new Date(d.date).toLocaleString("fr-BE", { timeZone: "Europe/Brussels" });
          let md = "# État du monitoring Ladbrokes\n\n";
          md += "Dernière vérification : **" + date + "** (heure belge)\n\n";
          md += "| Page | État | Détail |\n|---|---|---|\n";
          for (const r of d.results) {
            md += "| [" + r.name + "](" + r.url + ") | " + (r.ok ? "✅ OK" : "❌ ÉCHEC") + " | " + r.details[r.details.length-1].replace(/\\|/g, "-") + " |\n";
          }
          md += "\nURL vérifiées :\n";
          for (const r of d.results) { md += "- " + (r.ok ? "✅" : "❌") + " `" + r.url + "`\n"; }
          fs.writeFileSync("STATUS.md", md);
          '

      - name: Publier la page de statut
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add STATUS.md
          git diff --cached --quiet || git commit -m "Mise à jour du statut"
          git push

      - name: Sauvegarder les preuves (captures d'écran, DOM)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ github.run_id }}
          path: artifacts/
          retention-days: 14
