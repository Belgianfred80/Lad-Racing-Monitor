name: Monitoring Ladbrokes

on:
  schedule:
    - cron: "*/31 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Playwright
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Lancer les vérifications
        id: verif
        continue-on-error: true
        run: node monitor/check.js

      - name: Générer le rapport
        if: always()
        run: |
          node -e '
          const fs = require("fs");
          let d; try { d = JSON.parse(fs.readFileSync("artifacts/summary.json")); } catch(e) { process.exit(0); }
          const date = new Date(d.date).toLocaleString("fr-BE", { timeZone: "Europe/Brussels" });
          const detail = (r) => r.details[r.details.length-1].split("|").join("-");
          let md = "# Etat du monitoring Ladbrokes\n\n";
          md += "Derniere verification : **" + date + "** (heure belge)\n\n";
          md += "| Page | Etat | Detail |\n|---|---|---|\n";
          for (const r of d.results) {
            md += "| [" + r.name + "](" + r.url + ") | " + (r.ok ? "OK" : "ECHEC") + " | " + detail(r) + " |\n";
          }
          fs.writeFileSync("STATUS.md", md);
          let issue = "Verification du " + date + " (heure belge)\n\n";
          for (const r of d.results) {
            issue += (r.ok ? "OK — " : "ECHEC — ") + "**" + r.name + "**\n";
            issue += "URL : " + r.url + "\n";
            issue += "Detail : " + detail(r) + "\n\n";
          }
          issue += "_Les captures sont dans la section Artifacts du run._";
          fs.writeFileSync("issue.md", issue);
          const fails = d.results.filter(r => !r.ok).length;
          fs.writeFileSync("nb_echecs.txt", String(fails));
          '

      - name: Publier la page de statut
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add STATUS.md
          git diff --cached --quiet || git commit -m "Mise a jour du statut"
          git push || true

      - name: Alerter ou clore (e-mail via Issue)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NB=$(cat nb_echecs.txt 2>/dev/null || echo "1")
          gh label create monitoring --color D93F0B --description "Alerte du monitoring" 2>/dev/null || true
          OUVERTE=$(gh issue list --label monitoring --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ "$NB" != "0" ]; then
            if [ -z "$OUVERTE" ]; then
              gh issue create --title "ALERTE Monitoring Ladbrokes : $NB page(s) en echec" --body-file issue.md --label monitoring
            else
              echo "Alerte deja ouverte (#$OUVERTE), pas de nouvel e-mail."
            fi
          else
            if [ -n "$OUVERTE" ]; then
              gh issue close "$OUVERTE" --comment "Retour a la normale — toutes les pages sont saines."
            fi
          fi

      - name: Sauvegarder les preuves (captures ecran, DOM)
        if: steps.verif.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ github.run_id }}
          path: artifacts/
          retention-days: 14

      - name: Statut final du run
        if: steps.verif.outcome == 'failure'
        run: exit 1
