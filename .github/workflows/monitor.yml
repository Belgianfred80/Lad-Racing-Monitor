name: Monitoring Ladbrokes

on:
  schedule:
    - cron: "*/31 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installer Playwright
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Lancer les verifications
        id: verif
        continue-on-error: true
        run: node monitor/check.js

      - name: Recuperer le dernier incident
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --label monitoring --state all --limit 1 --json title,url,state,createdAt,closedAt > dernier_incident.json || echo "[]" > dernier_incident.json
          cat dernier_incident.json

      - name: Generer le rapport et la page de statut
        if: always()
        run: |
          node -e '
          const fs = require("fs");
          let d = null;
          try { d = JSON.parse(fs.readFileSync("artifacts/summary.json")); } catch(e) {}
          if (!d) {
            fs.writeFileSync("issue.md", "Le monitoring lui-meme a rencontre une erreur technique (aucun resultat produit). Voir les logs du run.");
            fs.writeFileSync("nb_echecs.txt", "1");
            process.exit(0);
          }
          const fdate = (iso) => new Date(iso).toLocaleString("fr-BE", { timeZone: "Europe/Brussels" });
          const date = fdate(d.date);
          const detail = (r) => r.details[r.details.length-1].split("|").join("-");
          let md = "# Etat du monitoring Ladbrokes\n\nDerniere verification : **" + date + "** (heure belge)\n\n| Page | Etat | Detail |\n|---|---|---|\n";
          for (const r of d.results) {
            md += "| [" + r.name + "](" + r.url + ") | " + (r.ok ? "OK" : "ECHEC") + " | " + detail(r) + " |\n";
          }
          fs.writeFileSync("STATUS.md", md);
          let issue = "Verification du " + date + " (heure belge)\n\n";
          for (const r of d.results) {
            issue += (r.ok ? "OK — " : "ECHEC — ") + "**" + r.name + "**\nURL : " + r.url + "\nDetail : " + detail(r) + "\n\n";
          }
          issue += "_Les captures sont dans la section Artifacts du run._";
          fs.writeFileSync("issue.md", issue);
          fs.writeFileSync("nb_echecs.txt", String(d.results.filter(r => !r.ok).length));
          let incidentHtml = "";
          try {
            const inc = JSON.parse(fs.readFileSync("dernier_incident.json"))[0];
            if (inc) {
              const resolu = inc.state === "CLOSED";
              const badge = resolu
                ? `<span class="badge ok-badge">Resolu le ${fdate(inc.closedAt)}</span>`
                : `<span class="badge ko-badge">EN COURS</span>`;
              incidentHtml = `<div class="incident">
                <h3>Dernier incident</h3>
                <p>${fdate(inc.createdAt)} — <a href="${inc.url}">${inc.title}</a> ${badge}</p>
              </div>`;
            } else {
              incidentHtml = `<div class="incident"><h3>Dernier incident</h3><p>Aucun incident enregistre.</p></div>`;
            }
          } catch(e) {}
          const carte = (r) => {
            const vitesse = r.loadTimeMs ? (r.loadTimeMs/1000).toFixed(1) + " s" : "-";
            const ligneOnline = r.ok ? "&#9989; En ligne" : "&#128308; PROBLEME";
            const ligneVitesse = r.ok ? "&#9989; Vitesse : " + vitesse : "&#128308; " + detail(r);
            return `<div class="carte ${r.ok ? "ok" : "ko"}">
              <h2>${r.name}</h2>
              <p class="url"><a href="${r.url}">${r.url}</a></p>
              <p class="etat">${ligneOnline}</p>
              <p class="etat">${ligneVitesse}</p>
            </div>`;
          };
          const html = `<!DOCTYPE html>
          <html lang="fr"><head><meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <meta http-equiv="refresh" content="300">
          <title>Statut monitoring Ladbrokes</title>
          <style>
            body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#f5f6f8; margin:0; padding:24px; color:#1a1a2e; }
            h1 { font-size:1.3rem; } .maj { color:#666; margin-bottom:20px; }
            .carte { background:#fff; border-radius:12px; padding:18px 22px; margin-bottom:16px; max-width:720px; box-shadow:0 1px 4px rgba(0,0,0,.08); border-left:6px solid #22a06b; }
            .carte.ko { border-left-color:#d93025; }
            .carte h2 { margin:0 0 6px; font-size:1.05rem; }
            .url { margin:0 0 10px; font-size:.85rem; word-break:break-all; } .url a { color:#3556c4; }
            .etat { margin:4px 0; font-size:1rem; }
            .incident { max-width:720px; margin-top:24px; padding:14px 22px; background:#fff; border-radius:12px; box-shadow:0 1px 4px rgba(0,0,0,.08); }
            .incident h3 { margin:0 0 8px; font-size:.95rem; color:#555; }
            .incident p { margin:0; font-size:.95rem; } .incident a { color:#3556c4; }
            .badge { padding:2px 10px; border-radius:20px; font-size:.8rem; font-weight:600; margin-left:6px; }
            .ok-badge { background:#e3f5ec; color:#1b7a4e; }
            .ko-badge { background:#fde8e6; color:#c5221f; }
          </style></head><body>
          <h1>Statut du monitoring Ladbrokes</h1>
          <p class="maj">Derniere verification : <strong>${date}</strong> (heure belge) — page rafraichie automatiquement</p>
          ${d.results.map(carte).join("")}
          ${incidentHtml}
          </body></html>`;
          fs.writeFileSync("index.html", html);
          '

      - name: Publier la page de statut
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          git add STATUS.md index.html 2>/dev/null || git add STATUS.md
          git diff --cached --quiet || git commit -m "Mise a jour du statut"
          git push || true

      - name: Alerter ou clore (e-mail via Issue)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NB=$(cat nb_echecs.txt 2>/dev/null || echo "1")
          gh label create monitoring --color D93F0B --description "Alerte du monitoring" 2>/dev/null || true
          OUVERTE=$(gh issue list --label monitoring --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ "$NB" != "0" ]; then
            if [ -z "$OUVERTE" ]; then
              gh issue create --title "ALERTE Monitoring Ladbrokes : $NB page(s) en echec" --body-file issue.md --label monitoring
            else
              echo "Alerte deja ouverte (#$OUVERTE), pas de nouvel e-mail."
            fi
          else
            if [ -n "$OUVERTE" ]; then
              gh issue close "$OUVERTE" --comment "Retour a la normale — toutes les pages sont saines."
            fi
          fi

      - name: Sauvegarder les preuves (captures ecran, DOM)
        if: steps.verif.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-${{ github.run_id }}
          path: artifacts/
          retention-days: 14

      - name: Statut final du run
        if: steps.verif.outcome == 'failure'
        run: exit 1
